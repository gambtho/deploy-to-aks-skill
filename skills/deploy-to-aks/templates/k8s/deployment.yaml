# =============================================================================
# Kubernetes Deployment Template — AKS Deploy Skill
# =============================================================================
# This template satisfies ALL 13 AKS Deployment Safeguard rules.
#
# REPLACE: <app-name>         — your application name (e.g., order-api)
# REPLACE: <namespace>        — target namespace (e.g., production)
# REPLACE: <image>            — full image reference with tag (e.g., myacr.azurecr.io/order-api:v1.2.3)
# REPLACE: <port>             — container port (e.g., 8080)
# REPLACE: <health-path>      — health check endpoint (e.g., /healthz)
# REPLACE: <ready-path>       — readiness check endpoint (e.g., /ready)
# REPLACE: <cpu-request>      — CPU request (e.g., 100m)
# REPLACE: <cpu-limit>        — CPU limit (e.g., 500m)
# REPLACE: <memory-request>   — memory request (e.g., 128Mi)
# REPLACE: <memory-limit>     — memory limit (e.g., 256Mi)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <app-name>
  namespace: <namespace>
  labels:
    app: <app-name>
spec:
  # DS010: Minimum 2 replicas for high availability
  replicas: 2
  selector:
    matchLabels:
      app: <app-name>
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: <app-name>
        # Workload Identity: enables the mutating webhook to inject
        # AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_FEDERATED_TOKEN_FILE
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: <app-name>

      # DS013: Do not auto-mount the default ServiceAccount token.
      # Workload Identity uses a separate projected volume managed by its webhook.
      automountServiceAccountToken: false

      # DS004 (pod-level): Run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # DS005: No hostNetwork
      hostNetwork: false
      # DS006: No hostPID
      hostPID: false
      # DS007: No hostIPC
      hostIPC: false

      containers:
        - name: <app-name>
          # DS009: Always use an explicit tag — never :latest or bare image
          image: <image>
          ports:
            - name: http
              containerPort: <port>
              protocol: TCP

          # DS001: Resource requests AND limits for cpu and memory
          resources:
            requests:
              cpu: "<cpu-request>"
              memory: "<memory-request>"
            limits:
              cpu: "<cpu-limit>"
              memory: "<memory-limit>"

          # DS002: Liveness probe
          livenessProbe:
            httpGet:
              path: <health-path>
              port: <port>
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          # DS003: Readiness probe
          readinessProbe:
            httpGet:
              path: <ready-path>
              port: <port>
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            # DS004 (container-level): Run as non-root
            runAsNonRoot: true
            # DS008: Not privileged
            privileged: false
            # DS011: No privilege escalation
            allowPrivilegeEscalation: false
            # DS012: Read-only root filesystem
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # If the app needs to write to specific paths (logs, tmp, cache),
          # mount emptyDir volumes below instead of disabling readOnlyRootFilesystem.
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
