name: Structural Tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  structural:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[test]"
      - name: Build monolith
        run: python3 scripts/build-skill.py
      - name: Verify monolith is up-to-date
        run: git diff --exit-code skills/deploy-to-aks/SKILL.copilot.md
      - name: Run structural tests
        run: pytest tests/structural/ -v
