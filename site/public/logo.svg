      <circle cx="10" cy="10" r="2.8" fill="#2563eb"/>
      <rect x="8.2" y="-1" width="3.6" height="5" rx="1.2" fill="#2563eb"/>
      <rect x="8.2" y="17" width="3.6" height="5" rx="1.2" fill="#2563eb"/>
      <rect x="-1" y="8.2" width="5" height="3.6" rx="1.2" fill="#2563eb"/>
      <rect x="17" y="8.2" width="5" height="3.6" rx="1.2" fill="#2563eb"/>
      <rect x="14.5" y="1" width="3.6" height="5" rx="1.2" fill="#2563eb" transform="rotate(45 16.3 3.5)"/>
      <rect x="1.5" y="14" width="3.6" height="5" rx="1.2" fill="#2563eb" transform="rotate(45 3.3 16.5)"/>
      <rect x="1" y="1.5" width="5" height="3.6" rx="1.2" fill="#2563eb" transform="rotate(-45 3.5 3.3)"/>
      <rect x="14" y="15" width="5" height="3.6" rx="1.2" fill="#2563eb" transform="rotate(-45 16.5 16.8)"/>
